<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emir Büfe Premium Menü</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; overflow-x: hidden; }
        
        .mobile-container { max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; position: relative; padding-bottom: 90px; box-shadow: 0 10px 50px rgba(0,0,0,0.08); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 50; background: rgba(255,255,255,0.98); backdrop-filter: blur(15px); border-top: 1px solid #f1f5f9; padding: 12px 28px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; transition: all 0.2s ease; }
        .nav-btn.active { color: #0f172a; }
        .nav-btn:active { transform: scale(0.92); }
        
        .cart-badge { position: absolute; top: -6px; right: -8px; background: #ef4444; color: white; font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
        .modal-content { width: 100%; max-width: 480px; max-height: 85vh; background: #ffffff; border-radius: 28px 28px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        
        .product-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .product-card:active { transform: scale(0.98); }
        
        .btn-add { background: #0f172a; color: white; border-radius: 12px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2); }
        .btn-add:active { transform: scale(0.9); background: #3b82f6; }
        
        .btn-primary { background: #0f172a; color: white; width: 100%; padding: 16px; border-radius: 16px; font-weight: 700; font-size: 1.05rem; transition: 0.2s; box-shadow: 0 4px 15px rgba(15, 23, 42, 0.25); }
        .btn-primary:active { transform: scale(0.98); }
        
        .category-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .category-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
        .category-card:active { transform: scale(0.95); }
        
        .price-badge { background: #0f172a; color: white; padding: 6px 12px; border-radius: 10px; font-size: 0.875rem; font-weight: 700; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const DUKKAN_BILGISI = {
            ad: "Emir Büfe & Cafe",
            slogan: "Hızlı, Sıcak ve Lezzetli",
            saatler: "07.00 - 18.30",
            adres: "Yenibosna Merkez, İstanbul",
            kapakFotografi: "fotolar/logo.png"
        };

        // Kategori fotoğraflarını kaybetmemek için burada tutuyoruz
        const KATEGORI_RESIMLERI = {
            "kategori_kahvalti": "fotolar/bukahvaltı.jpg",
            "kategori1": "fotolar/ızgara.jpg",
            "kategori2": "fotolar/gözleme.jpg",
            "kategori3": "fotolar/atıştırmalık.jpg",
            "kategori4": "fotolar/sicak.jpg",
            "kategori5": "fotolar/içecekler.jpg"
        };

        const Toast = ({ message }) => (
            <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-[#0f172a] text-white px-6 py-3 rounded-2xl shadow-2xl font-semibold z-[200] animate-slide-up flex items-center gap-3">
                <div className="w-2 h-2 bg-green-400 rounded-full"></div> {message}
            </div>
        );

        const App = () => {
            // === SENİN KODUNA YAPTIĞIM TEK EKLEME: MOTORA BAĞLANTI ===
            const [MENU_VERISI, setMenuVerisi] = useState([]);
            const [menulerYuklendi, setMenulerYuklendi] = useState(false);

            useEffect(() => {
                fetch("http://127.0.0.1:8000/api/menu")
                    .then(res => res.json())
                    .then(data => {
                        setMenuVerisi(data);
                        setMenulerYuklendi(true);
                    })
                    .catch(err => {
                        console.error("Motor kapalı!", err);
                    });
            }, []);

            const [aktifGorumum, setAktifGorunum] = useState('anasayfa');
            const [seciliKategori, setSeciliKategori] = useState(null);
            
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [toastMsg, setToastMsg] = useState(null);
            const [siparisNo, setSiparisNo] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [arama, setArama] = useState("");
            
            const [secenekModalUrun, setSecenekModalUrun] = useState(null);

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2500); };

            const addToCart = (urun, secilenSecenek = null) => {
                if (urun.secenekler && !secilenSecenek) { setSecenekModalUrun(urun); return; }

                let eklenecekUrun = { ...urun };
                let sepetBenzersizId = urun.id;

                if (secilenSecenek) {
                    eklenecekUrun.ad = `${urun.ad} (${secilenSecenek.ad})`;
                    eklenecekUrun.fiyat = secilenSecenek.fiyat;
                    sepetBenzersizId = `${urun.id}-${secilenSecenek.id}`;
                }

                eklenecekUrun.sepetId = sepetBenzersizId;

                setCart(prev => {
                    const varMi = prev.find(i => i.sepetId === sepetBenzersizId);
                    if (varMi) return prev.map(i => i.sepetId === sepetBenzersizId ? {...i, quantity: i.quantity + 1} : i);
                    return [...prev, {...eklenecekUrun, quantity: 1}];
                });
                showToast(`Sepete eklendi`);
                setSecenekModalUrun(null);
            };

            const updateQuantity = (sepetId, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.sepetId === sepetId) {
                        const newQty = Math.max(0, item.quantity + delta);
                        return newQty === 0 ? null : {...item, quantity: newQty};
                    }
                    return item;
                }).filter(Boolean));
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.fiyat * item.quantity), 0);
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            const submitOrder = async () => {
                if (siparisNo.trim() === "") { showToast("Lütfen masa numaranızı girin!"); return; }
                setIsLoading(true);
                
                try {
                    const apiSepet = cart.map(item => ({
                        sepetId: item.sepetId,
                        ad: item.ad,
                        fiyat: parseFloat(item.fiyat),
                        quantity: item.quantity
                    }));

                    const response = await fetch("http://127.0.0.1:8000/api/siparis-ver", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            masa_no: siparisNo,
                            sepet: apiSepet,
                            notlar: "" 
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        showToast(`Siparişi Mutfağa İlettik! (Fiş: ${data.siparis_id})`);
                        setCart([]); 
                        setSiparisNo(""); 
                        setIsCartOpen(false); 
                        setAktifGorunum('anasayfa');
                    } else {
                        showToast("Sipariş iletilemedi, kasaya bilgi verin.");
                    }
                } catch (error) {
                    showToast("Sistem motoru kapalı! Lütfen Python'u çalıştırın.");
                    console.error(error);
                } finally {
                    setIsLoading(false);
                }
            };

            // Menü yüklenene kadar efsane yükleme ekranı göster
            if (!menulerYuklendi) {
                return (
                    <div className="mobile-container flex flex-col items-center justify-center h-screen bg-[#f8fafc]">
                        <div className="w-12 h-12 border-4 border-gray-200 border-t-[#0f172a] rounded-full animate-spin mb-4"></div>
                        <div className="font-bold text-[#0f172a] tracking-wide">Menü Yükleniyor...</div>
                    </div>
                );
            }

            const AnaSayfa = () => (
                <div className="animate-fade-in pb-8">
                    <div className="bg-[#ffffff] text-[#0f172a] flex justify-between items-center px-5 py-4 sticky top-0 z-40 border-b border-gray-100 shadow-sm">
                        <div className="font-bold text-lg tracking-tight">Emir Büfe</div>
                        <button onClick={() => showToast('Garson masanıza yönlendiriliyor')} className="bg-[#f1f5f9] text-[#0f172a] px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition flex items-center gap-2">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            Garson Çağır
                        </button>
                    </div>

                    <div className="h-48 w-full bg-contain bg-no-repeat bg-white bg-center" style={{backgroundImage: `url('${DUKKAN_BILGISI.kapakFotografi}')`}}></div>

                    <div className="mx-4 -mt-6 bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.08)] relative z-10 border border-gray-50">
                        <h1 className="text-2xl font-extrabold text-[#0f172a] tracking-tight">{DUKKAN_BILGISI.ad}</h1>
                        <p className="text-sm text-gray-500 font-medium mt-1">{DUKKAN_BILGISI.slogan}</p>
                        <div className="mt-4 flex gap-3">
                            <span className="text-xs text-gray-600 font-semibold bg-[#f8fafc] px-3 py-2 rounded-xl border border-gray-100 flex items-center gap-2">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                {DUKKAN_BILGISI.saatler}
                            </span>
                        </div>
                    </div>

                    <div className="p-4 mt-4">
                        <div className="grid grid-cols-2 gap-4">
                            {MENU_VERISI.map(kategori => (
                                <div key={kategori.id} onClick={() => { setSeciliKategori(kategori); setAktifGorunum('kategori'); window.scrollTo(0,0); }} className="category-card relative rounded-3xl overflow-hidden aspect-square cursor-pointer shadow-[0_4px_20px_rgba(0,0,0,0.06)] border border-gray-100">
                                    <img src={KATEGORI_RESIMLERI[kategori.id] || "fotolar/logo.png"} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#0f172a]/90 via-[#0f172a]/30 to-transparent flex items-end p-4">
                                        <h2 className="text-white font-bold text-base leading-tight tracking-wide">{kategori.kategoriAdi}</h2>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const UrunListesi = () => {
                const filtreliUrunler = seciliKategori.urunler.filter(u => 
                    u.ad.toLowerCase().includes(arama.toLowerCase()) || 
                    (u.aciklama || "").toLowerCase().includes(arama.toLowerCase())
                );

                return (
                    <div className="animate-fade-in bg-white min-h-screen">
                        <div className="h-40 w-full relative">
                            <img src={KATEGORI_RESIMLERI[seciliKategori.id] || "fotolar/logo.png"} className="w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/70" />
                            <div className="absolute bottom-0 left-0 right-0 p-4">
                                <h2 className="text-white font-extrabold text-2xl drop-shadow-lg">{seciliKategori.kategoriAdi}</h2>
                                <p className="text-white/80 text-sm font-medium">{seciliKategori.urunler.length} ürün</p>
                            </div>
                        </div>

                        <div className="sticky top-0 bg-white/95 backdrop-blur-md z-40 border-b border-gray-100 px-4 py-3 flex items-center gap-3">
                            <button onClick={() => setAktifGorunum('anasayfa')} className="w-10 h-10 bg-[#f8fafc] text-[#0f172a] rounded-2xl flex items-center justify-center font-bold text-xl active:scale-90 transition shrink-0">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                            </button>
                            
                            <div className="flex-1 relative">
                                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                                <input 
                                    type="text" 
                                    placeholder="Ürün ara..." 
                                    value={arama}
                                    onChange={(e) => setArama(e.target.value)}
                                    className="w-full bg-[#f8fafc] border border-gray-200 rounded-2xl py-2.5 pl-10 pr-4 text-sm font-medium outline-none focus:border-[#0f172a] transition"
                                />
                                {arama && (
                                    <button onClick={() => setArama("")} className="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 bg-gray-300 rounded-full flex items-center justify-center text-white text-xs">
                                        ✕
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="p-4 space-y-4">
                            {filtreliUrunler.length === 0 ? (
                                <div className="py-12 text-center">
                                    <p className="text-gray-400 font-medium">Sonuç bulunamadı</p>
                                </div>
                            ) : (
                                filtreliUrunler.map(urun => (
                                    <div key={urun.id} className="product-card flex gap-4 p-4 bg-white rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-gray-100">
                                        <div className="w-24 h-24 rounded-2xl overflow-hidden bg-gray-100 shrink-0">
                                            <img src={urun.resim || "fotolar/logo.png"} className="w-full h-full object-cover" loading="lazy" />
                                        </div>
                                        <div className="flex-1 flex flex-col justify-between py-1">
                                            <div>
                                                <h3 className="font-bold text-[#0f172a] text-[1.05rem] leading-tight">{urun.ad}</h3>
                                                <p className="text-xs text-gray-500 mt-1 line-clamp-2 leading-relaxed font-medium">{urun.aciklama || ""}</p>
                                            </div>
                                            <div className="flex items-center justify-between mt-3">
                                                <span className="price-badge">
                                                    {urun.secenekler ? `₺${urun.secenekler[0].fiyat}'den` : `₺${urun.fiyat}`}
                                                </span>
                                                <button onClick={() => addToCart(urun)} className="btn-add">
                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="mobile-container">
                    {toastMsg && <Toast message={toastMsg} />}
                    {aktifGorumum === 'anasayfa' ? <AnaSayfa /> : <UrunListesi />}

                    <div className="bottom-nav">
                        <button onClick={() => showToast('Google Yorum linki...')} className="nav-btn">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            <span className="text-[10px] font-bold tracking-wide">Yorum Yap</span>
                        </button>
                        <button onClick={() => setAktifGorunum('anasayfa')} className={`nav-btn ${aktifGorumum === 'anasayfa' ? 'active' : ''}`}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <span className="text-[10px] font-bold tracking-wide">Menü</span>
                        </button>
                        <button onClick={() => setIsCartOpen(true)} className="nav-btn relative">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                            {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
                            <span className="text-[10px] font-bold tracking-wide">Sepetim</span>
                        </button>
                    </div>

                    {secenekModalUrun && (
                        <div className="modal-overlay" onClick={() => setSecenekModalUrun(null)}>
                            <div className="modal-content animate-slide-up p-6 pb-10" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <h3 className="text-xl font-extrabold text-[#0f172a] mb-1">{secenekModalUrun.ad}</h3>
                                        <p className="text-sm font-medium text-gray-500">Lütfen tercihinizi yapınız:</p>
                                    </div>
                                    <button onClick={() => setSecenekModalUrun(null)} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 font-bold">✕</button>
                                </div>
                                
                                <div className="space-y-3">
                                    {secenekModalUrun.secenekler.map(secenek => (
                                        <button key={secenek.id} onClick={() => addToCart(secenekModalUrun, secenek)} className="w-full flex justify-between items-center p-4 border border-gray-200 rounded-2xl hover:border-[#0f172a] hover:bg-gray-50 transition active:scale-[0.98]">
                                            <span className="font-bold text-[#0f172a]">{secenek.ad}</span>
                                            <span className="font-extrabold text-[#3b82f6]">₺{secenek.fiyat}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {isCartOpen && (
                        <div className="modal-overlay" onClick={() => setIsCartOpen(false)}>
                            <div className="modal-content animate-slide-up p-6 pb-10" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-extrabold text-[#0f172a]">Sepetiniz</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="w-8 h-8 bg-gray-100 text-gray-600 rounded-full font-bold flex items-center justify-center">✕</button>
                                </div>
                                {cart.length === 0 ? (
                                    <div className="py-12 text-center flex flex-col items-center">
                                        <svg className="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                                        <p className="text-gray-500 font-medium mb-4">Sepetiniz boş</p>
                                        <button onClick={() => setIsCartOpen(false)} className="text-[#0f172a] font-bold text-sm bg-[#f8fafc] px-6 py-2 rounded-xl border border-gray-200 active:scale-95 transition">
                                            Menüye Dön →
                                        </button>
                                    </div>
                                ) : (
                                    <>
                                        <div className="space-y-3 max-h-[40vh] overflow-y-auto mb-6 pr-2">
                                            {cart.map(item => (
                                                <div key={item.sepetId} className="flex items-center gap-4 bg-[#f8fafc] p-3 rounded-2xl border border-gray-100">
                                                    <div className="w-14 h-14 rounded-xl overflow-hidden bg-gray-200 shrink-0">
                                                        <img src={item.resim || "fotolar/logo.png"} className="w-full h-full object-cover" />
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <h4 className="font-bold text-[#0f172a] text-sm truncate">{item.ad}</h4>
                                                        <p className="text-sm font-extrabold text-[#3b82f6] mt-1">₺{item.fiyat}</p>
                                                    </div>
                                                    <div className="flex items-center gap-3 bg-white border border-gray-200 rounded-xl px-2 py-1 shrink-0">
                                                        <button onClick={() => updateQuantity(item.sepetId, -1)} className="w-7 h-7 font-bold text-gray-600 active:scale-90">-</button>
                                                        <span className="font-bold text-[#0f172a] w-4 text-center text-sm">{item.quantity}</span>
                                                        <button onClick={() => updateQuantity(item.sepetId, 1)} className="w-7 h-7 font-bold text-gray-600 active:scale-90">+</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="bg-[#f8fafc] p-5 rounded-2xl mb-6 border border-gray-100">
                                            <div className="flex justify-between items-center mb-4"><span className="font-semibold text-gray-500">Ödenecek Tutar</span><span className="font-black text-[#0f172a] text-2xl">₺{cartTotal}</span></div>
                                            <input type="text" placeholder="Masa Numaranız / Notunuz" className="w-full bg-white border border-gray-200 rounded-xl p-3 text-sm font-medium outline-none focus:border-[#0f172a] transition" value={siparisNo} onChange={(e) => setSiparisNo(e.target.value)} />
                                        </div>
                                        <button onClick={submitOrder} disabled={isLoading} className="btn-primary">{isLoading ? 'Sipariş İletiliyor...' : `Siparişi Tamamla`}</button>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
