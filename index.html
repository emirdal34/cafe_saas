<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emir Büfe - Sistem Girişi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    </style>
</head>
<body>

    <div class="w-full max-w-md bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-2xl text-center">
        <div class="mb-8">
            <h1 class="text-3xl font-black tracking-tight text-blue-500 mb-2">PROCOUNT<span class="text-white">SAAS</span></h1>
            <p class="text-slate-400 text-sm font-medium">Lütfen size verilen erişim PIN kodunu girin.</p>
        </div>

        <div id="hata-mesaji" class="hidden bg-red-950/50 border border-red-900 text-red-500 text-sm font-bold py-3 px-4 rounded-xl mb-6">
            Hatalı PIN Kodu!
        </div>

        <form id="loginForm" onsubmit="girisYap(event)" class="space-y-6">
            <div>
                <input type="password" id="pinKodu" placeholder="****" maxlength="4" autocomplete="off"
                    class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl px-6 py-4 text-center text-3xl tracking-[1em] font-black text-white outline-none focus:border-blue-500 transition-colors">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-[0.98] tracking-widest uppercase">
                SİSTEME GİRİŞ YAP
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-800 text-xs text-slate-600 font-semibold">
            Güvenli Bağlantı Aktif &bull; V3.0
        </div>
    </div>

    <script>
        // === ŞİFRE BELİRLEME ALANI ===
        const SIFRELER = {
            "1234": { rol: "kasa", url: "kasa.html" },
            "5678": { rol: "mutfak", url: "mutfak.html" },
            "8888": { rol: "patron", url: "patron.html" } // Patron şifresi yonetim.html'e de girebilir
        };

        function girisYap(e) {
            e.preventDefault();
            const pin = document.getElementById('pinKodu').value;
            const hata = document.getElementById('hata-mesaji');

            if (SIFRELER[pin]) {
                // Şifre doğruysa bilgisayarın hafızasına "Yetki Mührü" vur
                localStorage.setItem("procount_auth", SIFRELER[pin].rol);
                // İlgili sayfaya yönlendir
                window.location.href = SIFRELER[pin].url;
            } else {
                hata.classList.remove('hidden');
                document.getElementById('pinKodu').value = "";
                setTimeout(() => hata.classList.add('hidden'), 3000);
            }
        }

        // Eğer zaten giriş yapılmışsa, direkt sayfasına at
        window.onload = function() {
            const yetki = localStorage.getItem("procount_auth");
            if(yetki === "kasa") window.location.href = "kasa.html";
            if(yetki === "mutfak") window.location.href = "mutfak.html";
            if(yetki === "patron") window.location.href = "patron.html";
        }
    </script>
</body>
</html>
